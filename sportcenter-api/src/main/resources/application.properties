spring.application.name=sportcenter-api
spring.datasource.url=jdbc:mysql://localhost:3306/sportcenter?useSSL=false&serverTimezone=UTC&AllowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=progra2
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Activa Bean Validation en los callbacks pre-persist y pre-update de Hibernate.
# Garantiza que cualquier entidad que se intente guardar (incluso desde seeders,
# jobs o cualquier vía que no pase por @Valid en un controller) cumpla las
# restricciones declaradas en la entidad. Si alguna falla, Hibernate lanza
# ConstraintViolationException antes de tocar la base de datos.
spring.jpa.properties.jakarta.persistence.validation.mode=auto

